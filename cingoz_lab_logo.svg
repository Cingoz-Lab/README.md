<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes pulse1 { 0%,100%{r:50} 50%{r:53} }
    @keyframes pulse2 { 0%,100%{r:44} 50%{r:47} }
    @keyframes floatVes { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes spinRing  { from{transform:rotate(0deg)}   to{transform:rotate(360deg)}  }
    @keyframes spinRing2 { from{transform:rotate(0deg)}   to{transform:rotate(-360deg)} }
    @keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }
    @keyframes glow  { 0%,100%{opacity:.15} 50%{opacity:.35} }
    @media (prefers-reduced-motion: no-preference) {
      .cell1-mem { animation: pulse1 3s ease-in-out infinite; transform-origin:290px 155px; }
      .cell2-mem { animation: pulse2 4s ease-in-out infinite; transform-origin:460px 148px; }
      .nuc-ring  { animation: spinRing  18s linear infinite; transform-origin:290px 155px; }
      .nuc-ring2 { animation: spinRing2 12s linear infinite; transform-origin:460px 148px; }
      .v1 { animation: floatVes 2.4s ease-in-out infinite; }
      .v2 { animation: floatVes 3.1s ease-in-out infinite .6s; }
      .v3 { animation: floatVes 2.8s ease-in-out infinite 1.2s; }
      .v4 { animation: floatVes 3.5s ease-in-out infinite .3s; }
      .v5 { animation: floatVes 2.2s ease-in-out infinite 1.8s; }
      .v6 { animation: floatVes 3.8s ease-in-out infinite .9s; }
      .dot1 { animation: blink 1.8s ease-in-out infinite; }
      .dot2 { animation: blink 2.5s ease-in-out infinite .7s; }
      .dot3 { animation: blink 2.0s ease-in-out infinite 1.3s; }
      .bg-glow { animation: glow 4s ease-in-out infinite; }
    }
  </style>

  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a0e2e"/>
    <stop offset="100%" stop-color="#0d1b5e"/>
  </linearGradient>
  <radialGradient id="cellGrad1" cx="45%" cy="40%" r="55%">
    <stop offset="0%"   stop-color="#2a3a8f" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0d1b5e" stop-opacity="0.5"/>
  </radialGradient>
  <radialGradient id="cellGrad2" cx="45%" cy="40%" r="55%">
    <stop offset="0%"   stop-color="#243280" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0d1b5e" stop-opacity="0.5"/>
  </radialGradient>
  <radialGradient id="nucGrad1" cx="40%" cy="38%" r="60%">
    <stop offset="0%"   stop-color="#5070e0"/>
    <stop offset="100%" stop-color="#1a2a8c"/>
  </radialGradient>
  <radialGradient id="nucGrad2" cx="40%" cy="38%" r="60%">
    <stop offset="0%"   stop-color="#3a5bd0"/>
    <stop offset="100%" stop-color="#1a1a8c"/>
  </radialGradient>
  <radialGradient id="vesGrad" cx="35%" cy="35%" r="65%">
    <stop offset="0%"   stop-color="#4a6ae8" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#1a2a8c" stop-opacity="0.6"/>
  </radialGradient>

  <filter id="gf" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gfSoft" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <filter id="textGlow" x="-20%" y="-60%" width="140%" height="220%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="680" height="420" fill="url(#bgGrad)" rx="18"/>
<rect width="680" height="420" fill="none" stroke="#2a3a9f" stroke-width="1.5" rx="18" opacity="0.6"/>

<!-- Background glow orbs -->
<ellipse class="bg-glow" cx="290" cy="160" rx="160" ry="120" fill="#1a3aff" filter="url(#gfSoft)" opacity="0.18"/>
<ellipse class="bg-glow" cx="460" cy="150" rx="120" ry="100" fill="#3a5bff" filter="url(#gfSoft)" opacity="0.12"/>

<!-- Grid lines -->
<line x1="60"  y1="70"  x2="620" y2="70"  stroke="#1e2e6a" stroke-width="0.5"/>
<line x1="60"  y1="140" x2="620" y2="140" stroke="#1e2e6a" stroke-width="0.5"/>
<line x1="60"  y1="210" x2="620" y2="210" stroke="#1e2e6a" stroke-width="0.5"/>
