<line x1="60"  y1="350" x2="620" y2="350" stroke="#1e2e6a" stroke-width="0.5"/>
<line x1="140" y1="20"  x2="140" y2="400" stroke="#1e2e6a" stroke-width="0.5"/>
<line x1="220" y1="20"  x2="220" y2="400" stroke="#1e2e6a" stroke-width="0.5"/>
<line x1="300" y1="20"  x2="300" y2="400" stroke="#1e2e6a" stroke-width="0.5"/>
<line x1="380" y1="20"  x2="380" y2="400" stroke="#1e2e6a" stroke-width="0.5"/>
<line x1="460" y1="20"  x2="460" y2="400" stroke="#1e2e6a" stroke-width="0.5"/>
<line x1="540" y1="20"  x2="540" y2="400" stroke="#1e2e6a" stroke-width="0.5"/>

<!-- Left accent bar -->
<rect x="36" y="38" width="4" height="344" rx="2" fill="#3a5bff" opacity="0.8"/>

<!-- CELL 1 -->
<circle cx="290" cy="155" r="68" fill="#1a3aff" opacity="0.06" filter="url(#gfSoft)"/>
<circle cx="290" cy="155" r="60" fill="none" stroke="#3a5bff" stroke-width="0.6" opacity="0.2"/>
<circle cx="290" cy="155" r="56" fill="none" stroke="#3a5bff" stroke-width="0.4" opacity="0.15"/>
<circle class="cell1-mem" cx="290" cy="155" r="50" fill="url(#cellGrad1)" stroke="#3a5bff" stroke-width="1.8" opacity="0.95"/>
<circle class="nuc-ring" cx="290" cy="155" r="26" fill="none" stroke="#5070e0" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.5"/>
<circle cx="290" cy="155" r="22" fill="url(#nucGrad1)" stroke="#6080f0" stroke-width="1.2" opacity="0.95" filter="url(#gf)"/>
<circle class="dot1" cx="284" cy="150" r="3.5" fill="#a0b8ff" opacity="0.8"/>
<circle class="dot2" cx="296" cy="153" r="4.5" fill="#8aaaf0" opacity="0.8"/>
<circle class="dot3" cx="288" cy="163" r="3"   fill="#a0b8ff" opacity="0.7"/>
<line x1="258" y1="125" x2="242" y2="108" stroke="#3a5bff" stroke-width="1.2" opacity="0.6"/>
<circle cx="241" cy="107" r="2.5" fill="#5070e0" opacity="0.7"/>
<line x1="318" y1="120" x2="330" y2="102" stroke="#3a5bff" stroke-width="1.2" opacity="0.6"/>
<circle cx="331" cy="101" r="2.5" fill="#5070e0" opacity="0.7"/>
<line x1="248" y1="178" x2="232" y2="190" stroke="#3a5bff" stroke-width="1.2" opacity="0.6"/>
<circle cx="231" cy="191" r="2.5" fill="#5070e0" opacity="0.7"/>
<line x1="330" y1="178" x2="346" y2="190" stroke="#3a5bff" stroke-width="1.2" opacity="0.6"/>
<circle cx="347" cy="191" r="2.5" fill="#5070e0" opacity="0.7"/>
<line x1="265" y1="108" x2="255" y2="90" stroke="#3a5bff" stroke-width="1" opacity="0.5"/>
<circle cx="254" cy="89" r="2" fill="#5070e0" opacity="0.6"/>

<!-- CELL 2 -->
<circle cx="460" cy="148" r="55" fill="#1a3aff" opacity="0.05" filter="url(#gfSoft)"/>
<circle cx="460" cy="148" r="48" fill="none" stroke="#3a5bff" stroke-width="0.5" opacity="0.2"/>
<circle class="cell2-mem" cx="460" cy="148" r="44" fill="url(#cellGrad2)" stroke="#3a5bff" stroke-width="1.6" opacity="0.9"/>
<circle class="nuc-ring2" cx="460" cy="148" r="22" fill="none" stroke="#4060d0" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.5"/>
<circle cx="460" cy="148" r="18" fill="url(#nucGrad2)" stroke="#5070e0" stroke-width="1.1" opacity="0.95" filter="url(#gf)"/>
<circle class="dot2" cx="455" cy="144" r="3"   fill="#90a8f8" opacity="0.8"/>
<circle class="dot1" cx="465" cy="147" r="4"   fill="#7898e8" opacity="0.8"/>
<circle class="dot3" cx="458" cy="156" r="2.5" fill="#90a8f8" opacity="0.7"/>
<line x1="424" y1="122" x2="410" y2="106" stroke="#3a5bff" stroke-width="1.1" opacity="0.55"/>
<circle cx="409" cy="105" r="2.2" fill="#5070e0" opacity="0.7"/>
<line x1="494" y1="130" x2="508" y2="116" stroke="#3a5bff" stroke-width="1.1" opacity="0.55"/>
<circle cx="509" cy="115" r="2.2" fill="#5070e0" opacity="0.7"/>
<line x1="500" y1="160" x2="516" y2="170" stroke="#3a5bff" stroke-width="1" opacity="0.5"/>
<circle cx="517" cy="171" r="2"   fill="#5070e0" opacity="0.6"/>

<!-- Vesicles -->
<g class="v1">
  <circle cx="240" cy="105" r="9"   fill="url(#vesGrad)" stroke="#5070e0" stroke-width="1.2" opacity="0.85"/>
  <circle cx="237" cy="102" r="3"   fill="#8aaaf8" opacity="0.5"/>
</g>
<g class="v2">
  <circle cx="336" cy="90"  r="11"  fill="url(#vesGrad)" stroke="#5070e0" stroke-width="1.2" opacity="0.85"/>
