<!-- Footer -->
<line x1="44" y1="380" x2="636" y2="380" stroke="#1e2e6a" stroke-width="1"/>
<text x="340" y="397" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#4a5a9a" letter-spacing="1.2">BEZMIALEM VAKIF UNIVERSITY  ·  github.com/Cingoz-Lab</text>

