</g>
<g class="v4">
  <circle cx="504" cy="112" r="10"  fill="url(#vesGrad)" stroke="#5070e0" stroke-width="1.2" opacity="0.85"/>
  <circle cx="501" cy="109" r="3.5" fill="#8aaaf8" opacity="0.5"/>
</g>
<g class="v5">
  <circle cx="518" cy="170" r="7"   fill="url(#vesGrad)" stroke="#4060d0" stroke-width="1.1" opacity="0.8"/>
