  <circle cx="211" cy="175" r="2"   fill="#7898e8" opacity="0.45"/>
</g>

<!-- Tiny ambient dots -->
<circle cx="272" cy="84"  r="2"   fill="#5070e0" opacity="0.5"/>
<circle cx="358" cy="72"  r="1.5" fill="#4060d0" opacity="0.45"/>
<circle cx="418" cy="78"  r="2"   fill="#5070e0" opacity="0.4"/>
<circle cx="490" cy="88"  r="1.5" fill="#4060d0" opacity="0.4"/>
<circle cx="210" cy="140" r="5"   fill="url(#vesGrad)" stroke="#4060d0" stroke-width="1" opacity="0.7"/>

<!-- Typography -->
<text x="72" y="252" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#7090e0" letter-spacing="1.5" opacity="0.9">Welcome to the</text>
<text x="68" y="298" font-family="Georgia,serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="1" filter="url(#textGlow)">Cingöz Lab</text>
<rect x="68" y="306" width="360" height="3" rx="1.5" fill="#3a5bff"/>
<text x="68" y="327" font-family="Arial,sans-serif" font-size="11" fill="#8090c8" letter-spacing="0.5">Cancer Therapy Resistance and Tumor Metabolism Laboratory</text>

<!-- Tags -->
<rect x="68"  y="344" width="114" height="23" rx="11.5" fill="none" stroke="#3a5bff" stroke-width="1.3" opacity="0.8"/>
<text x="125" y="359" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" fill="#8aabff">Cancer Research</text>
<rect x="192" y="344" width="88"  height="23" rx="11.5" fill="none" stroke="#3a5bff" stroke-width="1.3" opacity="0.8"/>
